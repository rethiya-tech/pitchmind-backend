version: "3.9"
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pitchmind
      POSTGRES_PASSWORD: pitchmind
      POSTGRES_DB: pitchmind
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitchmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${GCS_CREDENTIALS_JSON:-/dev/null}:/gcs-key.json:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://pitchmind:pitchmind@db:5432/pitchmind
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID}
      GCS_BUCKET: ${GCS_BUCKET}
      GCS_CREDENTIALS_JSON: /gcs-key.json
      FRONTEND_URL: http://localhost:5173
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: alembic upgrade head
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://pitchmind:pitchmind@db:5432/pitchmind
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
