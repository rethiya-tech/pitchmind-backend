<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Green rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0F6E56"/>
  <!-- Stacked slide layers -->
  <rect x="7" y="5" width="14" height="17" rx="2" fill="white" fill-opacity="0.2"/>
  <rect x="6" y="6.5" width="14" height="17" rx="2" fill="white" fill-opacity="0.4"/>
  <!-- Main slide -->
  <rect x="5" y="8" width="16" height="18" rx="2.5" fill="white"/>
  <!-- Text lines on slide -->
  <rect x="8" y="12" width="10" height="1.8" rx="0.9" fill="#0F6E56"/>
  <rect x="8" y="15.5" width="7" height="1.5" rx="0.75" fill="#0F6E56" fill-opacity="0.45"/>
  <rect x="8" y="18.5" width="8.5" height="1.5" rx="0.75" fill="#0F6E56" fill-opacity="0.45"/>
  <!-- Right accent bar -->
  <rect x="23" y="10" width="4" height="14" rx="2" fill="white" fill-opacity="0.35"/>
</svg>
