name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: pitchmind
          POSTGRES_PASSWORD: pitchmind
          POSTGRES_DB: pitchmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://pitchmind:pitchmind@localhost:5432/pitchmind_test
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://pitchmind:pitchmind@localhost:5432/pitchmind_test
          TEST_DATABASE_URL: postgresql+asyncpg://pitchmind:pitchmind@localhost:5432/pitchmind_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          ANTHROPIC_API_KEY: test-key
          GCS_PROJECT_ID: test-project
          GCS_BUCKET: test-bucket
          GCS_CREDENTIALS_JSON: /dev/null
          FRONTEND_URL: http://localhost:5173
          ENVIRONMENT: test
        run: pytest tests/ -v --asyncio-mode=auto

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railwayapp/railway-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
