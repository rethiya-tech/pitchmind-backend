stages:
  - test
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  DATABASE_URL: "postgresql+asyncpg://pitchmind:pitchmind@postgres:5432/pitchmind_test"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "ci-test-secret-32-chars-minimum-x"
  ANTHROPIC_API_KEY: "sk-ant-placeholder"
  GEMINI_API_KEY: ""
  ENVIRONMENT: "test"

default:
  image: python:3.12-slim
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .pip-cache/

.install: &install
  before_script:
    - pip install --cache-dir .pip-cache -r requirements.txt -q

tests:
  stage: test
  <<: *install
  services:
    - name: postgres:15-alpine
      alias: postgres
      variables:
        POSTGRES_DB: pitchmind_test
        POSTGRES_USER: pitchmind
        POSTGRES_PASSWORD: pitchmind
    - name: redis:7-alpine
      alias: redis
  script:
    - alembic upgrade head
    - pytest tests/ -v --asyncio-mode=auto --tb=short
  coverage: '/TOTAL.*\s(\d+\.?\d*)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build-image:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - develop

deploy-production:
  stage: deploy
  image: alpine:3.19
  script:
    - echo "Deploy to Railway"
    # railway up --service pitchmind-backend
  environment:
    name: production
  only:
    - main
  when: manual
