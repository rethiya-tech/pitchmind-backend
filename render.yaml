services:
  - type: web
    name: pitchmind-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pitchmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pitchmind-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GCS_PROJECT_ID
        sync: false
      - key: GCS_BUCKET
        sync: false
      - key: GCS_CREDENTIALS_JSON
        sync: false

databases:
  - name: pitchmind-db
    plan: free
    databaseName: pitchmind
    user: pitchmind

  - name: pitchmind-redis
    plan: free
